<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Example Mouse Tracker</title>
    <style>
        body {
            height: 3000px;
            font-family: Helvetica, sans-serif; 

        }

        .dot {
            width: 4px;
            height: 4px;
            background-color: #00337C;
            position: absolute;
            z-index: -1;
            border-radius: 2px;
        }

        button {
            background: #03C988;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            color: #fff;
            text-transform: uppercase;
        }

        textarea {
            position: absolute;
            top: 50vh;
            right: 10vw;
            border-radius: 10px;
            
        }


    </style>
</head>

<body>

    <button  id="button1"  onclick="onClickButton('03C988')">
        Button 1
    </button>


    
    <button id="button2" style="position: absolute; left: 40vw; top: 10vw; background-color: #00337C;" onclick="onClickButton('00337C')">
        Button 2
    </button>

    <textarea id="text_box"></textarea>

    <div id="result">

    </div>
    <script>
        result_element = document.getElementById('result')
        onClickButton = (value) => {
            result_element.innerHTML += `<p style="color: #${value}">Clicked</p>`

        }
        onmousemove = function (e) {
            //Logging purposes
            console.log("mouse location:", e.clientX, e.clientY);

            //meat and potatoes of the snippet
            var pos = e;
            var dot;
            dot = document.createElement('div');
            dot.className = "dot";
            dot.style.left = pos.x + "px";
            dot.style.top = pos.y + "px";
            document.body.appendChild(dot);
        }
    </script>
</body>

</html>
